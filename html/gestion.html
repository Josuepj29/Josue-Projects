<!DOCTYPE html>  
<html lang="es">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>Gestión de Artículos</title> 
    <link rel="stylesheet" href="../css/style_garticulos.css"> 
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">  
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</head>  
<body>  

<div class="container mt-5">  
    <h1 class="text-center">Gestión de Artículos</h1> 

    <nav>
        <a href="#" class="mx-2">Nuevo</a>
        <a href="#" class="mx-2">Modificar</a>
        <a href="#" class="mx-2">Ver stock de artículos</a>
    </nav>


    <form class="mb-4">  
        <div class="form-row">  
            <div class="col">  
                <input type="text" class="form-control" placeholder="Descripción" aria-label="Descripción">  
            </div>  
            <div class="col">  
                <input type="text" class="form-control" placeholder="Descripción2" aria-label="Descripción2">  
            </div>  
            <div class="col">  
                <input type="text" class="form-control" placeholder="Proveedor" aria-label="Proveedor">  
            </div>  
            <button type="submit" class="btn btn-primary">Buscar</button>  
        </div>  
    </form>  

    <table class="table table-sm ">  
        <thead>  
            <tr>  
                <th>Código</th>  
                <th>Descripción</th>  
                <th>Precio</th>  
                <th>Cantidad</th>  
            </tr>  
        </thead>  
        <tbody>  
            <!-- BD -->  
            <tr>  
                <td colspan="8" class="text-center">No hay datos disponibles</td>  
            </tr>  
        </tbody>  
    </table>  
</div>  

</body>  
</html>
