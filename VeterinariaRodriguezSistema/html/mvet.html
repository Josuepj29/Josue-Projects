<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>M.Vet – Atención Médica</title>

  <!-- CSS base: fondo, fuentes, etc. -->
  <link rel="stylesheet" href="../css/base.css" />

  <!-- CSS específico para MVet -->
  <link rel="stylesheet" href="../css/mvet.css" />
    <!-- Bootstrap CSS -->
 <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">




</head>
<body>

  <div id="mvet-container" class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>M.Vet – Atención Médica</h2>
      <a href="principal.html" class="btn btn-secondary">Menú Principal</a>
    </div>

    <h4>Mascotas en Sala de Espera</h4>
    <table class="table table-bordered table-hover">
      <thead class="thead-light">
        <tr>
          <th>Dueño</th>
          <th>Mascota</th>
          <th>Teléfono</th>
          <th>Dirección</th>
          <th>NHC (CodAlt)</th>
          <th>Estado</th>  <!-- Agregar la columna de estado -->
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tablaMVet"><!-- dinámico --></tbody>
    </table>
  </div>

  <!-- Modal: registrar anamnesis / tratamiento -->
  <div class="modal fade" id="modalAtencion" tabindex="-1" role="dialog" aria-labelledby="modalAtencionLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg" role="document" style="max-width: 850px;">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Atención médica</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar"><span aria-hidden="true">&times;</span></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="codPacienteActual" />

          <div class="form-group">
            <label for="inputAnamnesis">Anamnesis</label>
            <textarea class="form-control" id="inputAnamnesis" rows="4" placeholder="Describe síntomas, antecedentes…"></textarea>
          </div>

          <div class="form-group">
            <label for="inputTratamiento">Tratamiento / Costos</label>
            <textarea class="form-control" id="inputTratamiento" rows="4" placeholder="Medicamentos, procedimientos, costos…"></textarea>
          </div>

         <div class="form-group">
  <label>Archivos adjuntos</label>
  <input type="file" id="inputArchivos" multiple accept="image/*,application/pdf" />
  <div id="previewArchivos" class="d-flex flex-wrap gap-3 mt-3"></div>
</div>


        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="guardarAtencion()">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal: confirmar envío / liberar paciente -->
  <div class="modal fade" id="modalConfirmar" tabindex="-1" role="dialog" aria-labelledby="modalConfirmarLabel" aria-hidden="true">
    <div class="modal-dialog" role="document" style="max-width: 400px;">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Confirmar envío</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar"><span aria-hidden="true">&times;</span></button>
        </div>
        <div class="modal-body">
          ¿Deseas confirmar esta atención? El paciente se eliminará de la lista.
        </div>
        <div class="modal-footer">
          <button class="btn btn-danger" onclick="confirmarEnvio()">Sí, confirmar</button>
          <button class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

<!-- Modal de Historial Clínico -->
<div id="modalHistorialClinico" class="modal" tabindex="-1" role="dialog">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Historial Clínico</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body" id="modalHistorialClinicoBody">
        <!-- Aquí se cargará el historial clínico -->
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
      </div>
    </div>
  </div>
</div>


  <!-- Modal: recordatorios -->
  <div class="modal fade" id="modalRecordatorios" tabindex="-1" role="dialog" aria-labelledby="modalRecordatoriosLabel" aria-hidden="true">
    <div class="modal-dialog" role="document" style="max-width: 500px;">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalRecordatoriosLabel">Recordatorios</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Cerrar"><span aria-hidden="true">&times;</span></button>
        </div>
        <div class="modal-body">
          <label for="selectNuevoRecordatorio">Agregar nuevo recordatorio:</label>
        <select id="selectNuevoRecordatorio" class="form-control mb-3">
  <option value="" selected disabled>Seleccione un recordatorio</option>
  <optgroup label="Cita médica">
    <option value="cita_medica">Cita médica - 1 día</option>
  </optgroup>
  <optgroup label="Vacunas Perros">
    <option value="puppy_14">Vac. Puppy - 14 días</option>
    <option value="puppy_21">Vac. Puppy - 21 días</option>
    <option value="Cuadruple_14">Vac. Cuádruple - 14 días</option>
    <option value="Cuadruple_21">Vac. Cuádruple - 21 días</option>
    <option value="Quintuple_14">Vac. Quíntuple - 14 días</option>
    <option value="Quintuple_21">Vac. Quíntuple - 21 días</option>
    <option value="Quintuple_180">Vac. Quíntuple - 180 días</option>
    <option value="Quintuple_corona_14">Vac. Quíntuple + Coronavirus - 14 días</option>
    <option value="Quintuple_corona_21">Vac. Quíntuple + Coronavirus - 21 días</option>
    <option value="Quintuple_corona_180">Vac. Quíntuple + Coronavirus - 180 días</option>
    <option value="Sextuple_rabia">Vac. Séxtuple + rabia - 365 días</option>
    <option value="KC">Vac. KC - 365 días</option>
    <option value="Vac_rabia">Vac. Rabia - 365 días</option>
  </optgroup>
  <optgroup label="Desparasitación externa">
    <option value="pipetas_14">Pipetas - 14 días</option>
    <option value="pipetas_30">Pipetas - 30 días</option>
    <option value="desparasitacion_externa_30">Desparasitación externa - 30 días</option>
    <option value="desparasitacion_externa_90">Desparasitación externa - 90 días</option>
  </optgroup>
  <optgroup label="Desparasitación interna">
    <option value="oxantel_1">Oxantel - 1 día</option>
    <option value="oxantel_10">Oxantel - 10 días</option>
    <option value="oxantel_30">Oxantel - 30 días</option>
    <option value="oxantel_60">Oxantel - 60 días</option>
    <option value="puppymec_1">Puppymec - 1 día</option>
    <option value="puppymec_10">Puppymec - 10 días</option>
    <option value="puppymec_14">Puppymec - 14 días</option>
    <option value="fripets_10">Fripets - 10 días</option>
    <option value="fripets_30">Fripets - 30 días</option>
    <option value="fripets_60">Fripets - 60 días</option>
  </optgroup>
  <optgroup label="Vacuna gatos">
    <option value="Triple_felina">Vac. Triple felina - 14 días</option>
    <option value="Triple_felina_21">Vac. Triple felina - 21 días</option>
    <option value="Triple_felina_365">Vac. Triple felina - 365 días</option>
    <option value="Leucemia">Vac. Leucemia - 30 días</option>
    <option value="Vac_rabia">Vac. Rabia - 365 días</option>
  </optgroup>
</select>
        <button id="btnAgregarRecordatorio" class="btn btn-primary btn-block mb-3">Agregar</button>

            <!-- Opciones restantes ... -->
          </select>
          <hr />
          <h6>Recordatorios agregados:</h6>
          <ul id="listaRecordatorios" class="list-group"></ul>
          <hr />
          <div class="form-group">
            <label for="inputFechaCita">Fecha de cita médica (opcional)</label>
            <input type="date" id="inputFechaCita" class="form-control" />
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
        </div>
      </div>
    </div>
  </div>


  <!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>

<!-- Pooper -->
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"></script>
<!-- Boostrap js-->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>


  <script src="../js/mvet.js"></script>
</body>
</html>
